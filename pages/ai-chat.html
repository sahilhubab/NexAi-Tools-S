<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>WowGe AI Chat</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>

<body>
   <header class="chat-header">

   <a href="dashboard.html" class="back-btn">← Dashboard </a>
    
    <h2>🤖 WowGe AI</h2>

    <div class="chat-actions">

        <button id="clear-chat" title="Clear Chat">
            🗑
        </button>

        <button id="download-chat" title="Download Chat">
            📥
        </button>

        <button id="regenerate-btn" title="Regenerate">
            🔄
        </button>

    </div>

</header>
    
    <!-- AI Chat Section -->
     <div class="chat-layout">

    <aside class="chat-sidebar">

        <button id="new-chat-btn">
            ➕ New Chat
        </button>

        <div class="chat-history">

            <div class="history-item active">
                💬 Chat 1
            </div>

            <div class="history-item">
                💬 Chat 2
            </div>

            <div class="history-item">
                💬 Chat 3
            </div>

        </div>

    </aside>
<section class="chat-section">

    <h2>🤖 WowGe AI Chat</h2>

    <div class="chat-box">

        <div class="chat-messages">
            <div id="typing-indicator" class="typing-indicator" style="display:none;">

    <span>🤖 WowGe AI is typing</span>

    <div class="typing-dots">
        <span></span>
        <span></span>
        <span></span>
    </div>

</div>

            <div class="bot-message">
                👋 Hello! I'm WowGe AI. How can I help you today?
            </div>

        </div>

        <div class="chat-input">

            <input
                type="text"
                id="user-input"
                placeholder="Type your message..."
            >

            <button id="send-btn">
                Send
            </button>

        </div>

    </div>

</section>
<script src="../js/common.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="../js/chat.js"></script>
</body>

</html>
